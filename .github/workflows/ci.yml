name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Work around occasional `ld.lld` crashes on GitHub-hosted runners when linking
      # very large test binaries (DuckDB + Polars + Arrow). Force GNU ld (bfd).
      RUSTFLAGS: "-C link-arg=-fuse-ld=bfd -C debuginfo=0"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Rust fmt
        run: cargo fmt --all --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Lean CLI build without plotting
        run: cargo check -p barsmith_cli --no-default-features

      - name: Shell script syntax
        run: bash -n scripts/*.sh

      - name: Stale CLI flag drift check
        run: scripts/check_stale_cli_flags.sh

      - name: Rust tests
        run: cargo test --workspace --all-targets --all-features

      - name: Registry schema check
        run: scripts/check_registry_schema.sh

      - name: Rust docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --all-features

      - name: Golden smoke
        run: scripts/golden_smoke.sh

      - name: Rust synthetic performance gate
        run: scripts/performance_gate.sh

      - name: Rust CLI benchmark smoke
        run: scripts/benchmark_smoke.sh

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: barsmith-benchmark-reports
          path: |
            target/barsmith-bench/*.json
            target/barsmith-bench/*.md
          if-no-files-found: ignore
